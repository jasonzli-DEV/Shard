services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    # Bootstrap: copy .env.example → .env on the host and fill in at minimum
    # STARTER_MONGODB_URI before running `docker compose up`. All other config
    # (OAuth creds, publicUrl, allowedOrigins, JWT secret) is stored in the
    # starter DB and managed via the setup wizard — no file writes needed.
    env_file: .env
    environment:
      NODE_ENV: production
    ports:
      - '4000:4000'
    volumes:
      - ./logs:/app/logs
    healthcheck:
      # wget is built into node:20-alpine (busybox); curl is not installed.
      test: ['CMD', 'wget', '--spider', '-q', 'http://localhost:4000/api/health']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - '80:80'
    depends_on:
      backend:
        condition: service_healthy
    environment:
      BACKEND_URL: http://backend:4000

# No local DB service — starter cluster is remote Atlas M0
